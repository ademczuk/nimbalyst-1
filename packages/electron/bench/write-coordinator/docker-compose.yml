services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: nimbalyst_bench
    ports:
      - "15555:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20

  bench:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_URL: postgres://postgres:bench@postgres:5432/nimbalyst_bench
      BENCH_DURATION_MS: "20000"
      PG_POOL_MAX: "20"
    volumes:
      - ./results:/app/results
    command: ["node", "bench.mjs"]
